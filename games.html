<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Game</title>
<link rel="stylesheet" href="/css/dino.css">
</head>
<body>

<div class="game">

    <!-- Start Screen -->
    <div id="startScreen">Press SPACE or TAP to Start</div>

    <!-- Score -->
    <div id="score">Score: 0</div>

    <!-- High Score -->
    <div id="highScore">Best: 0</div>

    <!-- Clouds -->
    <div class="cloud"></div>
    <div class="cloud2"></div>

    <!-- Dino -->
    <div id="dino"></div>

    <!-- Cactus -->
    <div id="cactus"></div>

    <!-- Ground -->
    <div class="ground"></div>

    <!-- Retry Button -->
    <button id="retryBtn">Retry</button>

</div>

<script src="/js/dino.js"></script>
</body>
</html>
