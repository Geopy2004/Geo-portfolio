<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dino Game</title>

<link rel="stylesheet" href="/css/dino.css">
</head>

<body>

<div class="game">

    <!-- HUD (Score UI) -->
    <div class="hud">
        <div id="score">Score: 0</div>
        <div id="highScore">Best: 0</div>
    </div>

    <!-- Clouds -->
    <div class="cloud"></div>
    <div class="cloud2"></div>

    <!-- Ground -->
    <div class="ground"></div>

    <!-- Dino -->
    <div id="dino"></div>

    <!-- Cactus -->
    <div id="cactus"></div>

    <!-- Start Screen -->
    <div id="startScreen">
        <h2>Dino Game</h2>
        <p>Tap or Press SPACE to Start</p>
    </div>

    <!-- Game Over / Retry -->
    <div id="gameOverScreen">
        <h2>Game Over</h2>
        <button id="retryBtn">Retry</button>
    </div>

</div>

<script src="/js/dino.js"></script>

</body>
</html>
